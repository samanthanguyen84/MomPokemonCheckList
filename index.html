<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Yuka Morii Cards ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#c084fc;--bg:#fff0f9;--text:#4a2060;--got:#d1fae5;--got-b:#34d399;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.header{background:linear-gradient(135deg,#ff6eb4,#c084fc,#818cf8);color:#fff;text-align:center;padding:26px 16px 20px;overflow:hidden;position:relative;}
.header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='8' fill='%23fff' fill-opacity='.07'/%3E%3C/svg%3E");pointer-events:none;}
.header h1{font-size:25px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.15);line-height:1.2;}
.header p{font-size:14px;opacity:.92;margin-top:6px;}
.hdr-emoji{font-size:32px;display:block;margin-bottom:6px;}
.prog-wrap{background:#fff;margin:14px 12px 10px;border-radius:18px;padding:16px 20px;box-shadow:0 4px 12px rgba(192,132,252,.18);border:2px solid #e9d5ff;}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.prog-label span{font-weight:800;font-size:15px;color:var(--purple);}
.prog-label .cnt{font-size:24px;font-weight:900;color:var(--pink);}
.bar-bg{background:#f3e8ff;border-radius:99px;height:18px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#ff6eb4,#c084fc);border-radius:99px;transition:width .5s ease;min-width:4px;}
.srch{margin:0 12px 10px;}
.srch input{width:100%;padding:14px 18px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;border:3px solid #e9d5ff;border-radius:14px;outline:none;color:var(--text);background:#fff;}
.srch input:focus{border-color:var(--purple);}
.srch input::placeholder{color:#c4b5fd;}
.filters{display:flex;gap:8px;margin:0 12px 14px;}
.fbtn{flex:1;padding:11px 4px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;border:3px solid #e9d5ff;border-radius:12px;background:#fff;color:#a78bfa;cursor:pointer;transition:.2s;}
.fbtn.active{background:linear-gradient(135deg,#ff6eb4,#c084fc);color:#fff;border-color:transparent;box-shadow:0 4px 10px rgba(192,132,252,.3);}
#card-list{padding:0 12px;}
.prow{background:#fff;border-radius:16px;padding:15px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(192,132,252,.1);border:2.5px solid #f3e8ff;cursor:pointer;user-select:none;margin-bottom:10px;transition:.18s;}
.prow:active{transform:scale(.97);}
.prow.owned{background:var(--got);border-color:var(--got-b);}
.check{width:42px;height:42px;min-width:42px;border-radius:50%;border:3px solid #d8b4fe;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;transition:.2s;}
.owned .check{background:var(--got-b);border-color:var(--got-b);color:#fff;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:19px;font-weight:900;line-height:1.2;}
.owned .rname{color:#065f46;}
.rset{font-size:12px;font-weight:700;color:#a78bfa;margin-top:2px;}
.owned .rset{color:#059669;}
.rbadge{font-size:13px;font-weight:800;padding:6px 12px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.bg{background:#fce7f3;color:#9d174d;}
.bg-got{background:#d1fae5;color:#065f46;}
.no-res{text-align:center;padding:40px 20px;color:#c084fc;font-size:18px;font-weight:700;}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.pop-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;align-items:center;justify-content:center;}
.pop-ov.show{display:flex;}
.pop-box{background:#fff;border-radius:26px;padding:34px 26px;text-align:center;max-width:300px;width:88%;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.pop-em{font-size:60px;display:block;margin-bottom:8px;}
.pop-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,#ff6eb4,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.pop-msg{font-size:16px;font-weight:700;color:#7c3aed;line-height:1.4;margin-bottom:20px;}
.pop-close{background:linear-gradient(135deg,#ff6eb4,#c084fc);color:#fff;border:none;border-radius:14px;padding:15px 30px;font-size:18px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(192,132,252,.4);}
.footer-note{text-align:center;padding:22px;font-size:13px;color:#c084fc;font-weight:700;}
</style>
</head>

<div class="pop-ov" id="pop">

    <button class="pop-close" onclick="closePop()">Woohoo! 🎊</button>
  </div>
</div>
<div class="header">
  <span class="hdr-emoji">🧶✨</span>

</div>

</div>
<div class="srch">

</div>
<div class="filters">
  <button class="fbtn active" onclick="setFilter('all',this)">All 206</button>
  <button class="fbtn" onclick="setFilter('need',this)">❤️ Still Need</button>
  <button class="fbtn" onclick="setFilter('got',this)">✅ Got It!</button>

<div id="card-list"></div>
<div class="footer-note">💜 Progress saves automatically on this phone 💜</div>

function key(c){return c.name+'|'+c.set;}
let owned=new Set();
let currentFilter='all';

function load(){
  try{
    const s=localStorage.getItem('yuka-v5');
    if(s){owned=new Set(JSON.parse(s));}
    else{owned=new Set(STARTER);save();}
  }catch(e){owned=new Set(STARTER);}
}
function save(){try{localStorage.setItem('yuka-v5',JSON.stringify([...owned]));}catch(e){}}
function updateProg(){
  const n=owned.size;
  document.getElementById('owned-count').textContent=n;
  document.getElementById('prog-bar').style.width=(n/206*100)+'%';
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

    const k=key(c),isOwned=owned.has(k);
    const ms=!search||c.name.toLowerCase().includes(search)||c.set.toLowerCase().includes(search);
    const mf=currentFilter==='all'||(currentFilter==='got'&&isOwned)||(currentFilter==='need'&&!isOwned);
    return ms&&mf;
  });
  if(!cards.length){list.innerHTML='<div class="no-res">😅 No cards found!<br>Try a different search</div>';return;}
  cards.sort((a,b)=>{
    const ao=owned.has(key(a)),bo=owned.has(key(b));
    if(ao!==bo)return ao?1:-1;
    return a.name.localeCompare(b.name);
  });
  list.innerHTML='';
  cards.forEach(c=>{
    const k=key(c),isOwned=owned.has(k);
    const div=document.createElement('div');
    div.className='prow'+(isOwned?' owned':'');
    div.innerHTML='<div class="check">'+(isOwned?'✓':'')+'</div><div class="rinfo"><div class="rname">'+c.name+'</div><div class="rset">'+c.set+'</div></div><div class="rbadge '+(isOwned?'bg-got':'bg')+'">'+(isOwned?'✅ Got it!':'🔍 Need')+'</div>';
    div.addEventListener('click',()=>toggle(c));
    list.appendChild(div);
  });
}
function toggle(c){
  const k=key(c),wasOwned=owned.has(k),name=c.name;
  if(wasOwned){owned.delete(k);}
  else{owned.add(k);}
  save();updateProg();renderList();
  if(!wasOwned){showPop(name);launchConfetti();}
}
function showPop(name){
  document.getElementById('pop-em').textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  document.getElementById('pop-msg').textContent=name+'! '+MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById('pop').classList.add('show');
}
function closePop(){document.getElementById('pop').classList.remove('show');}
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#ff6eb4','#c084fc','#fde047','#6ee7b7','#818cf8','#fb923c','#f472b6','#34d399'];
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*200,w:8+Math.random()*10,h:5+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.2,vx:(Math.random()-.5)*5,vy:3+Math.random()*5,alpha:1}));
  let raf;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      if(p.y<canvas.height+40){
        alive=true;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;
        if(p.y>canvas.height*.65)p.alpha=Math.max(0,p.alpha-.025);
        ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      }
    });
    if(alive){raf=requestAnimationFrame(draw);}else{ctx.clearRect(0,0,canvas.width,canvas.height);}
  })();
}
load();updateProg();renderList();
</script>
</body>
